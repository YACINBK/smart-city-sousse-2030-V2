version: "3.8"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: neo_sousse_db
    environment:
      POSTGRES_DB: neo_sousse
      POSTGRES_USER: neo_user
      POSTGRES_PASSWORD: neo_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neo_user -d neo_sousse"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: neo_sousse_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://neo_user:neo_password@db:5432/neo_sousse
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py --server.address 0.0.0.0

volumes:
  pgdata:
